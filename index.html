<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Molahadatina</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <i class="fas fa-book"></i>
                <span>Molahadat</span>
            </div>
            <div class="nav-user" id="navUser"></div>
        </div>
    </nav>

    <div class="container">
        <!-- المواد -->
        <div class="subjects-section">
            <div class="section-header">
                <h2><i class="fas fa-book"></i> المواد الدراسية</h2>
                <button class="btn-secondary" onclick="resetFilters()">عرض الكل</button>
            </div>
            <div class="subjects-grid" id="subjectsContainer"></div>
            <button class="add-subject-btn" onclick="addNewSubject()">➕ إضافة مادة</button>
        </div>

        <!-- إضافة ملاحظة -->
        <div class="add-note-section">
            <h2>📝 ملاحظة جديدة</h2>
            <input type="text" id="noteTitle" placeholder="العنوان" class="form-input">
            <select id="noteSubject" class="form-select"></select>
            <textarea id="noteContent" placeholder="نص الملاحظة..." class="form-textarea" rows="5"></textarea>
            <button onclick="addNote()" class="btn-primary">📤 نشر</button>
            <button onclick="clearForm()" class="btn-secondary">🗑️ مسح</button>
        </div>

        <!-- الملاحظات -->
        <div class="notes-section">
            <div class="section-header">
                <h2>📋 جميع الملاحظات</h2>
                <div class="filters">
                    <input type="text" id="searchNotes" placeholder="🔍 بحث..." class="search-input">
                    <select id="filterSubject" class="filter-select"></select>
                    <select id="sortBy" class="filter-select">
                        <option value="newest">الأحدث</option>
                        <option value="oldest">الأقدم</option>
                        <option value="mostLikes">الأكثر إعجاباً</option>
                    </select>
                </div>
            </div>
            <div id="notesList" class="notes-list"></div>
        </div>
    </div>

    <!-- نافذة اسم المستخدم (بسيطة) -->
    <div id="loginModal" class="modal">
        <div class="modal-content">
            <i class="fas fa-user-circle" style="font-size: 4rem; color: #4f46e5;"></i>
            <h2>مرحباً بك</h2>
            <p>أدخل اسمك للبدء</p>
            <input type="text" id="usernameInput" placeholder="اسمك" class="form-input">
            <button onclick="saveUsername()" class="btn-primary">دخول</button>
        </div>
    </div>

    <div id="messageContainer"></div>
    <script type="module" src="script.js"></script>
</body>
</html>
